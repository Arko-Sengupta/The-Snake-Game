<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — Three.js Edition</title>
  <link rel="stylesheet" href="Styles/Main.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="Hud">
    <div id="ScoreDisplay">
      <span class="Lbl">SCORE</span>
      <span id="ScoreVal">0</span>
    </div>
    <div id="BestDisplay">
      <span class="Lbl">BEST</span>
      <span id="BestVal">0</span>
    </div>
    <div id="LevelDisplay">
      <span class="Lbl">LEVEL</span>
      <span id="LevelVal">1</span>
    </div>
    <div id="ComboDisplay">x2 COMBO!</div>
    <div id="ProgressWrap">
      <div id="ProgressLabel">0 / 5 TO LEVEL 2</div>
      <div id="ProgressBarBg"><div id="ProgressBarFill"></div></div>
    </div>
    <div id="LevelUpMsg">LEVEL UP!</div>
  </div>

  <div class="Screen" id="StartScreen">
    <div class="GameTitle">SNAKE</div>
    <div class="Subtitle">Three.js Edition</div>
    <div class="PressStart">Press Space or Click to Start</div>
    <div class="ControlsHint">WASD / ARROW KEYS TO MOVE | SPACE TO PAUSE</div>
  </div>

  <div class="Screen" id="PauseScreen" style="display:none">
    <div style="font-size:clamp(3rem,10vw,6rem);font-weight:900;letter-spacing:12px;color:#ffee00;text-shadow:0 0 12px #ffee00,0 0 30px #ffee0088;">PAUSED</div>
    <div class="PressStart" style="margin-top:40px">Press Space to Resume</div>
  </div>

  <div class="Screen" id="GameoverScreen">
    <div class="GoTitle" data-text="GAME OVER">GAME OVER</div>
    <div class="GoScoreWrap">
      <div class="GoLbl">SCORE</div>
      <div class="GoScoreVal" id="GoScoreVal">0</div>
      <div class="GoLbl" style="margin-top:10px">BEST</div>
      <div class="GoBestVal" id="GoBestVal">0</div>
    </div>
    <div id="NewHighBadge">NEW HIGH SCORE!</div>
    <div class="PressStart">Press Space or Click to Restart</div>
  </div>

  <div id="Flash"></div>

  <canvas id="GameCanvas"></canvas>

  <script type="module" src="Scripts/Main.js"></script>
</body>
</html>
